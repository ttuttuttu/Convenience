<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>발췌 ❀ 케이브덕</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700;800&family=Song+Myung&family=Nanum+Pen+Script&family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @font-face { font-family:'Paperlogy'; font-weight:400; font-display:swap; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2'); }
  @font-face { font-family:'Paperlogy'; font-weight:700; font-display:swap; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2'); }
  :root {
    --paper:#E8E4DE; --surface:#F4F1EC; --ink:#2A2227;
    --plum:#6E4A5A; --plum-d:#5C3B4A; --mauve:#9A8B8F;
    --line:#D8D0C9; --gold:#C9A24A;
    --serif:'Gowun Batang', serif; --sans:'Pretendard', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 32px 20px 80px; }
  header.top { margin-bottom: 22px; }
  .eyebrow { font-size: 11px; letter-spacing: .28em; text-transform: uppercase; color: var(--mauve); margin: 0 0 8px; }
  h1 { font-family: var(--serif); font-weight: 700; font-size: 30px; margin: 0; display: flex; gap: 10px; align-items: baseline; }
  h1 .orn { color: var(--gold); font-size: 20px; }
  .lede { color: var(--mauve); font-size: 13px; margin: 8px 0 0; }

  .layout { display: grid; grid-template-columns: 1fr 312px; gap: 22px; align-items: start; }
  @media (max-width: 780px) { .layout { grid-template-columns: 1fr; } }

  .stage { display: flex; justify-content: center; padding: 18px; border-radius: 14px;
    background: repeating-conic-gradient(#ECE9E3 0% 25%, #E3DED7 0% 50%) 50% / 22px 22px; }
  #card {
    width: 100%; max-width: 560px; min-height: 200px; padding: 40px 38px; border-radius: 16px;
    background: linear-gradient(135deg, #6E4A5A, #2A2227); color: #F4F1EC;
    box-shadow: 0 14px 40px rgba(42,34,39,.28); display: flex; flex-direction: column;
    background-repeat: no-repeat;
  }
  #card-body { flex: 1 1 auto; font-family: var(--serif); font-size: 19px; line-height: 1.9; outline: none; word-break: break-word; white-space: pre-wrap; }
  #card-body:empty::before { content: '여기에 발췌할 글이 들어옵니다. 직접 입력하거나 붙여넣어도 돼요.'; color: rgba(255,255,255,.5); }
  #card-sig { margin-top: 22px; font-family: var(--sans); font-size: 13px; letter-spacing: .08em; opacity: .82; }
  #card-sig:empty { display: none; }

  .panel { display: flex; flex-direction: column; gap: 16px; }
  .group { border: 1px solid var(--line); border-radius: 12px; padding: 14px 15px; background: var(--surface); }
  .group h3 { margin: 0 0 11px; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--mauve); font-weight: 600; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 9px; }
  .row:last-child { margin-bottom: 0; }
  .seg { display: flex; gap: 4px; background: #E3DCD4; border-radius: 8px; padding: 3px; width: 100%; }
  .seg button { flex: 1; border: none; background: transparent; padding: 7px 6px; border-radius: 6px; font: inherit; font-size: 12.5px; color: var(--ink); cursor: pointer; }
  .seg button.on { background: #fff; color: var(--plum-d); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  label.lab { font-size: 12px; color: var(--mauve); min-width: 40px; }
  input[type=color] { width: 34px; height: 30px; padding: 0; border: 1px solid var(--line); border-radius: 6px; background: #fff; cursor: pointer; }
  input.hex { width: 96px; font: inherit; font-size: 12.5px; padding: 7px 9px; border: 1px solid var(--line); border-radius: 7px; background: #fff; color: var(--ink); outline: none; }
  input.hex:focus { border-color: var(--plum); }
  input[type=range] { flex: 1; accent-color: var(--plum); min-width: 80px; }
  select.sel { width: 100%; font: inherit; font-size: 13px; padding: 9px 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink); outline: none; }
  .btn { border: 1px solid var(--line); background: #fff; color: var(--ink); font: inherit; font-size: 12.5px; padding: 8px 11px; border-radius: 8px; cursor: pointer; }
  .btn:hover { border-color: var(--plum); color: var(--plum); }
  .btn.full { width: 100%; }
  .btn.solid { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn.solid:hover { background: var(--plum-d); border-color: var(--plum-d); color: var(--paper); }
  .hint { font-size: 11px; color: var(--mauve); margin-top: 6px; line-height: 1.5; }
  .filebtn { position: relative; overflow: hidden; }
  .filebtn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .val { font-size: 12px; color: var(--mauve); min-width: 36px; text-align: right; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <p class="eyebrow">caveduck excerpt</p>
    <h1><span class="orn">❀</span>발췌</h1>
    <p class="lede">고른 글을 카드로 꾸며 이미지로 저장하세요.</p>
  </header>

  <div class="layout">
    <div class="stage" id="stage">
      <div id="card">
        <div id="card-body" contenteditable="true" spellcheck="false"></div>
        <div id="card-sig"></div>
      </div>
    </div>

    <div class="panel">
      <div class="group">
        <h3>용지 비율</h3>
        <div class="seg" id="ratio">
          <button data-r="auto" class="on">자유</button>
          <button data-r="1">1:1</button>
          <button data-r="1.3333">4:3</button>
          <button data-r="0.75">3:4</button>
        </div>
      </div>

      <div class="group">
        <h3>배경</h3>
        <div class="seg" id="bgmode">
          <button data-m="gradient" class="on">그라데이션</button>
          <button data-m="solid">단색</button>
          <button data-m="image">이미지</button>
        </div>
        <div id="bg-grad" style="margin-top:11px">
          <div class="row"><label class="lab">색 1</label><input type="color" id="c1" value="#6E4A5A"><input class="hex" id="c1h" value="#6E4A5A"></div>
          <div class="row"><label class="lab">색 2</label><input type="color" id="c2" value="#2A2227"><input class="hex" id="c2h" value="#2A2227"></div>
          <div class="row"><label class="lab">각도</label><input type="range" id="ang" min="0" max="360" value="135"><span class="val" id="angv">135°</span></div>
        </div>
        <div id="bg-solid" style="display:none;margin-top:11px">
          <div class="row"><label class="lab">색</label><input type="color" id="cs" value="#2A2227"><input class="hex" id="csh" value="#2A2227"></div>
        </div>
        <div id="bg-image" style="display:none;margin-top:11px">
          <div class="row"><button class="btn full filebtn">이미지 고르기<input type="file" id="bgfile" accept="image/*"></button></div>
          <div class="row"><label class="lab">크기</label><input type="range" id="imgsize" min="50" max="300" value="120"><span class="val" id="imgsizev">120%</span></div>
          <div class="row"><label class="lab">가로</label><input type="range" id="imgx" min="0" max="100" value="50"><span class="val" id="imgxv">50%</span></div>
          <div class="row"><label class="lab">세로</label><input type="range" id="imgy" min="0" max="100" value="50"><span class="val" id="imgyv">50%</span></div>
          <div class="row"><label class="lab">어둡게</label><input type="range" id="dark" min="0" max="85" value="35"><span class="val" id="darkv">35%</span></div>
        </div>
      </div>

      <div class="group">
        <h3>글자</h3>
        <div class="row"><select class="sel" id="font">
          <option value="'Gowun Batang', serif">고운바탕 (명조)</option>
          <option value="'Nanum Myeongjo', serif">나눔명조</option>
          <option value="'Song Myung', serif">송명</option>
          <option value="'Paperlogy', sans-serif">페이퍼로지</option>
          <option value="'Pretendard', sans-serif">프리텐다드</option>
          <option value="'Gowun Dodum', sans-serif">고운돋움</option>
          <option value="'Jua', sans-serif">주아 (둥근)</option>
          <option value="'Nanum Pen Script', cursive">나눔손글씨 펜</option>
          <option value="'Gaegu', cursive">개구 (손글씨)</option>
        </select></div>
        <div class="row"><label class="lab">정렬</label><div class="seg" id="align"><button data-a="left">좌</button><button data-a="center" class="on">중</button><button data-a="right">우</button></div></div>
        <div class="row"><label class="lab">글자색</label><input type="color" id="fc" value="#F4F1EC"><input class="hex" id="fch" value="#F4F1EC"></div>
        <div class="row"><label class="lab">크기</label><input type="range" id="size" min="14" max="34" value="19"><span class="val" id="sizev">19</span></div>
        <div class="row">
          <button class="btn" id="hl">형광펜</button><input type="color" id="hlc" value="#C9A24A">
          <button class="btn" id="ul">밑줄</button><button class="btn" id="clear">효과지움</button>
        </div>
        <p class="hint">형광펜·밑줄은 카드에서 글자를 선택한 뒤 누르세요.</p>
      </div>

      <div class="group">
        <h3>서명 (하단 고정)</h3>
        <div class="row"><input class="hex" id="sig" style="width:100%" placeholder="캐릭터 이름/제작자"></div>
        <div class="row"><label class="lab">정렬</label><div class="seg" id="sigalign"><button data-a="left">좌</button><button data-a="center">중</button><button data-a="right" class="on">우</button></div></div>
      </div>

      <div class="group">
        <h3>내보내기</h3>
        <button class="btn solid full" id="png">이미지로 저장</button>
      </div>
    </div>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const card = $('#card'), body = $('#card-body'), sigEl = $('#card-sig');

/* 들어온 발췌 텍스트 받기 (보관함과 같은 도메인 localStorage 공유) */
(function () {
  try {
    const raw = localStorage.getItem('ttu_excerpt_payload');
    if (raw) {
      const p = JSON.parse(raw);
      body.textContent = (p.text || '').trim();
      localStorage.removeItem('ttu_excerpt_payload');
    }
  } catch (_) {}
})();

/* 용지 비율 */
$('#ratio').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  [...$('#ratio').children].forEach(x => x.classList.toggle('on', x === b));
  card.style.aspectRatio = b.dataset.r === 'auto' ? 'auto' : b.dataset.r;
});

/* 배경 */
const bg = { mode: 'gradient', c1: '#6E4A5A', c2: '#2A2227', ang: 135, cs: '#2A2227', img: null, size: 120, x: 50, y: 50, dark: 35 };
function paint() {
  card.style.backgroundSize = ''; card.style.backgroundPosition = '';
  if (bg.mode === 'gradient') card.style.background = `linear-gradient(${bg.ang}deg, ${bg.c1}, ${bg.c2})`;
  else if (bg.mode === 'solid') card.style.background = bg.cs;
  else if (bg.mode === 'image' && bg.img) {
    const d = bg.dark / 100;
    card.style.backgroundImage = `linear-gradient(rgba(0,0,0,${d}),rgba(0,0,0,${d})), url(${bg.img})`;
    card.style.backgroundSize = `auto, ${bg.size}%`;
    card.style.backgroundPosition = `center, ${bg.x}% ${bg.y}%`;
    card.style.backgroundRepeat = 'no-repeat, no-repeat';
  } else if (bg.mode === 'image') card.style.background = '#2A2227';
}
$('#bgmode').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  bg.mode = b.dataset.m;
  [...$('#bgmode').children].forEach(x => x.classList.toggle('on', x === b));
  $('#bg-grad').style.display = bg.mode === 'gradient' ? '' : 'none';
  $('#bg-solid').style.display = bg.mode === 'solid' ? '' : 'none';
  $('#bg-image').style.display = bg.mode === 'image' ? '' : 'none';
  paint();
});
function syncColor(picker, hex, key, after) {
  const set = (v) => { if (!/^#[0-9a-fA-F]{6}$/.test(v)) return; bg[key] = v; $(picker).value = v; $(hex).value = v; (after || paint)(); };
  $(picker).addEventListener('input', () => set($(picker).value));
  $(hex).addEventListener('input', () => set($(hex).value.trim()));
}
syncColor('#c1', '#c1h', 'c1'); syncColor('#c2', '#c2h', 'c2'); syncColor('#cs', '#csh', 'cs');
$('#ang').addEventListener('input', () => { bg.ang = +$('#ang').value; $('#angv').textContent = bg.ang + '°'; paint(); });
$('#bgfile').addEventListener('change', (e) => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { bg.img = r.result; paint(); }; r.readAsDataURL(f); });
const imgCtl = (id, key, suffix) => $(id).addEventListener('input', () => { bg[key] = +$(id).value; $(id + 'v').textContent = $(id).value + (suffix || ''); paint(); });
imgCtl('#imgsize', 'size', '%'); imgCtl('#imgx', 'x', '%'); imgCtl('#imgy', 'y', '%'); imgCtl('#dark', 'dark', '%');

/* 글자 */
$('#font').addEventListener('change', () => { body.style.fontFamily = $('#font').value; });
$('#align').addEventListener('click', (e) => { const b = e.target.closest('button'); if (!b) return; [...$('#align').children].forEach(x => x.classList.toggle('on', x === b)); body.style.textAlign = b.dataset.a; });
function setFC(v) { if (!/^#[0-9a-fA-F]{6}$/.test(v)) return; body.style.color = v; $('#fc').value = v; $('#fch').value = v; }
$('#fc').addEventListener('input', () => setFC($('#fc').value));
$('#fch').addEventListener('input', () => setFC($('#fch').value.trim()));
$('#size').addEventListener('input', () => { body.style.fontSize = $('#size').value + 'px'; $('#sizev').textContent = $('#size').value; });
function exec(cmd, val) { body.focus(); document.execCommand(cmd, false, val); }
['hl', 'ul', 'clear'].forEach(id => $('#' + id).addEventListener('mousedown', e => e.preventDefault()));
$('#hl').addEventListener('click', () => exec('hiliteColor', $('#hlc').value));
$('#ul').addEventListener('click', () => exec('underline'));
$('#clear').addEventListener('click', () => exec('removeFormat'));

/* 서명 (하단 고정 + 정렬) */
$('#sig').addEventListener('input', () => { sigEl.textContent = $('#sig').value.trim(); });
$('#sigalign').addEventListener('click', (e) => { const b = e.target.closest('button'); if (!b) return; [...$('#sigalign').children].forEach(x => x.classList.toggle('on', x === b)); sigEl.style.textAlign = b.dataset.a; });
sigEl.style.textAlign = 'right';

/* 이미지로 저장 */
$('#png').addEventListener('click', async () => {
  const btn = $('#png'); btn.textContent = '만드는 중…'; btn.disabled = true;
  try {
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
    const canvas = await html2canvas(card, { scale: 2, backgroundColor: null, useCORS: true });
    const a = document.createElement('a'); a.href = canvas.toDataURL('image/png'); a.download = `발췌_${Date.now()}.png`; a.click();
  } catch (e) { alert('이미지 저장 실패: ' + e.message); }
  btn.textContent = '이미지로 저장'; btn.disabled = false;
});
</script>
</body>
</html>
